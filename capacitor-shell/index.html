<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>RClipper</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .wrap {
        display: flex;
        height: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      img {
        width: 96px;
        height: 96px;
        border-radius: 20px;
      }
      .spin {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: r 0.9s linear infinite;
      }
      @keyframes r {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="./logo.png" alt="RClipper" />
      <div class="spin"></div>
      <p>กำลังเชื่อมต่อ RClipper…</p>
    </div>
  </body>
</html>
